<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game - Settings</title>
</head>

<body class="settings">

  <section class="settings_content">

    <section class="settings_header">
      <h2>Settings</h2>
      <div class="underline">
        <div class="underline_square"></div>
        <div class="underline_line"></div>
      </div>
    </section>

    <section class="settings_box">
      <div class="settings_section">
        <section class="game_mode">
          
          <header class="game_mode_header">
            <img src="../public/assets/icons/palette.svg" alt="Palette Icon" class="game_mode_header_icon">
            <h3>Game themes</h3>
          </header>

          <button class="theme_button theme_button_one">
            <img src="../public/assets/icons/off.svg" alt="Off Icon">
            Code vibes theme
          </button>
          <button class="theme_button theme_button_two">
            <img src="../public/assets/icons/off.svg" alt="Off Icon">
            Gaming theme
          </button>
          <button class="theme_button theme_button_three">
            <img src="../public/assets/icons/off.svg" alt="Off Icon">
            DA Projects theme
          </button>
          <button class="theme_button theme_button_four">
            <img src="../public/assets/icons/off.svg" alt="Off Icon">
            Food theme
          </button>

        </section>

        <section class="choose_player">

        </section>

        <section class="board_size">

        </section>
      </div>

      <section class="settings_feedback">

      </section>
    </section>

  </section>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
